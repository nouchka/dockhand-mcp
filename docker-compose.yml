services:
  dockhand-mcp:
    image: ghcr.io/markhaines/dockhand-mcp:latest
    ports:
      - "8000:8000"
    environment:
      - DOCKHAND_URL=${DOCKHAND_URL:-http://localhost:3000}
      - DOCKHAND_TOKEN=${DOCKHAND_TOKEN:-}
      - PORT=8000
      - ROOT_PATH=${ROOT_PATH:-}
    restart: unless-stopped
